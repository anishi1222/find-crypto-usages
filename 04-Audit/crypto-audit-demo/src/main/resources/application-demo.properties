# =============================================================================
# Demo profile overrides — convenient local run settings
# Activate with: --spring.profiles.active=demo
# =============================================================================

spring.datasource.url=jdbc:postgresql://localhost:5432/pqcdemo?sslmode=require
spring.datasource.username=pqcdemo
spring.datasource.password=pqcdemo
spring.jpa.hibernate.ddl-auto=update

# Allow startup without a running database (demo mode only).
# Spring Boot 4 modularized auto-configuration packages; keep exclusions on
# Boot 4 class names that can appear when JDBC/security starters are present.
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

server.ssl.key-store-password=changeit

app.security.jwt.issuer=pqc-demo
app.security.jwt.keystore.password=changeit
app.security.allow-public-demo-endpoints=true

app.license.keystore.password=changeit
app.license.allow-demo-signing=true
server.ssl.client-auth=none

#
