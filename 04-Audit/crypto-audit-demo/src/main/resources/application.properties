# =============================================================================
# PQC Crypto Audit Demo — production-first defaults
# =============================================================================

spring.application.name=crypto-audit-demo

# -----------------------------------------------------------------------------
# CRYPTO AUDIT POINT — PostgreSQL JDBC with TLS
# -----------------------------------------------------------------------------
# verify-full enforces certificate and hostname verification in production.
spring.datasource.url=${APP_DB_URL:jdbc:postgresql://localhost:5432/pqcdemo?sslmode=verify-full}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${APP_DB_USERNAME:pqcdemo}
spring.datasource.password=${APP_DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# -----------------------------------------------------------------------------
# CRYPTO AUDIT POINT — HTTPS / TLS server configuration
# -----------------------------------------------------------------------------
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=${SERVER_SSL_KEYSTORE_PASSWORD}
server.ssl.key-store-type=PKCS12
server.ssl.client-auth=none
server.port=8443

# -----------------------------------------------------------------------------
# Logging
# -----------------------------------------------------------------------------
logging.level.com.example.pqcdemo=INFO
logging.level.org.springframework.security=WARN

# -----------------------------------------------------------------------------
# JWT settings (Spring Security OAuth2 Resource Server)
# -----------------------------------------------------------------------------
app.security.jwt.issuer=${APP_JWT_ISSUER}
app.security.jwt.keystore.path=${APP_JWT_KEYSTORE_PATH:classpath:keystore.p12}
app.security.jwt.keystore.password=${APP_JWT_KEYSTORE_PASSWORD}
app.security.jwt.keystore.alias=${APP_JWT_KEY_ALIAS:server}

# Public token/verify endpoints are disabled by default (production mode).
app.security.allow-public-demo-endpoints=${APP_SECURITY_ALLOW_PUBLIC_DEMO_ENDPOINTS:false}

# -----------------------------------------------------------------------------
# License verification settings
# -----------------------------------------------------------------------------
app.license.keystore.path=${APP_LICENSE_KEYSTORE_PATH:classpath:keystore.p12}
app.license.keystore.password=${APP_LICENSE_KEYSTORE_PASSWORD}
app.license.keystore.alias=${APP_LICENSE_KEY_ALIAS:server}

# Demo-only license signing is disabled by default (verify-only mode).
app.license.allow-demo-signing=${APP_LICENSE_ALLOW_DEMO_SIGNING:false}
